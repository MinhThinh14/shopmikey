<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKEY SHOP | TRANG CHỦ</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .category-section { margin: 2rem 0; }
        .category-title { font-size: 1.8rem; font-weight: 700; border-left: 5px solid #00f2ff; padding-left: 1rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .category-title i { margin-right: 0.75rem; color: #00f2ff; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; padding: 0.5rem 0; }
        .product-card { background: rgba(8, 18, 28, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 0px; transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 242, 255, 0.3); border-color: #00f2ff; }
        .product-img { height: 120px; background-color: #0a1420; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #00f2ff; }
        .sold-badge { background: rgba(0,0,0,0.7); display: inline-block; padding: 0.2rem 0.8rem; font-size: 0.75rem; border-radius: 20px; margin: 0.5rem 0; color: #ffd966; border: 1px solid #ffd966; }
        .price-tag { font-size: 1.4rem; font-weight: bold; color: #00ff9d; margin: 0.5rem 0; }
        .buy-btn { width: 100%; margin-top: 0.8rem; }
        .note { font-size: 0.7rem; color: #aaa; margin-top: 0.5rem; text-align: center; }
        .loading { text-align: center; padding: 2rem; color: cyan; }
        .error-box { background: #ff000022; border: 1px solid red; padding: 1rem; margin: 1rem; text-align: center; }
        .debug-area { background: #0a0f1f; border: 1px solid cyan; padding: 10px; margin: 10px 0; font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; }
        .debug-log { color: #0f0; }
        .debug-error { color: #f66; }
        button.small-btn { background: #333; border: 1px solid cyan; color: cyan; padding: 5px 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body class="futuristic-bg">
    <nav class="neon-nav">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-cube"></i><span>MIKEY<span class="glow">SHOP</span></span></div>
            <div class="nav-links">
                <a href="home.html" class="nav-item active"><i class="fas fa-store"></i> Trang chủ</a>
                <a href="orders.html" class="nav-item"><i class="fas fa-truck-fast"></i> Đơn hàng</a>
                <a href="deposit.html" class="nav-item"><i class="fas fa-coins"></i> Nạp Robux</a>
            </div>
            <div class="user-panel">
                <div class="credit-badge"><i class="fas fa-gem"></i><span id="userBalance">0</span> Robux</div>
                <button id="logoutBtn" class="cyber-button small"><i class="fas fa-power-off"></i> Thoát</button>
            </div>
        </div>
    </nav>
    <main class="main-content" style="padding: 1rem 2rem;">
        <div class="hero-future">
            <h2>⚡ ROBLOX <span class="neon-text">PREMIUM SHOP</span></h2>
            <p>Sản phẩm & Dịch vụ chất lượng cao | Giao hàng tức thì</p>
        </div>
        <div style="text-align: right; margin-bottom: 10px;">
            <button id="resetProductsBtn" class="small-btn"><i class="fas fa-trash"></i> Xóa & Tạo lại sản phẩm</button>
        </div>
        <div id="debugPanel" class="debug-area">
            <strong>🔍 DEBUG LOG:</strong><br>
            <div id="debugContent"></div>
        </div>
        <div id="dynamicCategories" class="loading">Đang tải sản phẩm...</div>
    </main>
    <footer class="cyber-footer"><p>© 2036 MIKEY SHOP — Roblox uy tín số 1</p></footer>
    <script type="module">
        import { auth, db, collection, getDocs, doc, runTransaction, addDoc, deleteDoc, onAuthStateChanged } from './js/firebase-config.js';
        import { updateBalanceDisplay } from './js/common.js';

        const container = document.getElementById('dynamicCategories');
        const debugDiv = document.getElementById('debugContent');
        function addLog(msg, isErr = false) {
            const p = document.createElement('div');
            p.className = isErr ? 'debug-error' : 'debug-log';
            p.innerText = new Date().toLocaleTimeString() + ' - ' + msg;
            debugDiv.appendChild(p);
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(msg);
        }

        const allItems = [
            { name: "Clan (10k)", price: 1500, description: "Nâng cấp Clan hệ 10k", image: "🏰", category: "sanpham", sold: 1234 },
            { name: "Race (10k)", price: 15000, description: "Đổi Race hệ 10k", image: "🧬", category: "sanpham", sold: 892 },
            { name: "Reroll (10k)", price: 15000, description: "Reroll chỉ số hệ 10k", image: "🎲", category: "sanpham", sold: 756 },
            { name: "Rank 1-8", price: 25000, description: "Nâng rank từ 1 lên 8", image: "📊", category: "sanpham", sold: 2103 },
            { name: "Aura / Cosmetic", price: 2000, description: "Mở khóa hiệu ứng aura hoặc cosmetic", image: "✨", category: "sanpham", sold: 3456 },
            { name: "Rương Mythical", price: 500, description: "Mở rương Mythical (10k)", image: "📦", category: "sanpham", sold: 5678 },
            { name: "Rương Legendary", price: 2000, description: "Mở rương Legendary (10k)", image: "🎁", category: "sanpham", sold: 4321 },
            { name: "Pass (10k)", price: 750, description: "Game Pass đặc biệt", image: "🎟️", category: "sanpham", sold: 987 },
            { name: "Key Gil / Slime", price: 400, description: "Key mở boss Gil hoặc Slime", image: "🔑", category: "sanpham", sold: 654 },
            { name: "Key Maiden / Anos / Saber / Aizen", price: 750, description: "Key mở boss Maiden, Anos, Saber, Aizen", image: "🗝️", category: "sanpham", sold: 321 },
            { name: "Key Gojo / Sukuna", price: 500, description: "Key mở boss Gojo hoặc Sukuna", image: "⚡", category: "sanpham", sold: 111 },
            { name: "Boss Ticket", price: 500, description: "Vé vào cửa boss (10k)", image: "🎫", category: "sanpham", sold: 2222 },
            { name: "Set Aizen v1", price: 10000, description: "Full set Aizen phiên bản 1", image: "👑", category: "dichvu", sold: 178 },
            { name: "Set Aizen v2 + f + title", price: 20000, description: "Set Aizen v2 kèm f và title", image: "🔥", category: "dichvu", sold: 95 },
            { name: "Set Maiden + f + title", price: 20000, description: "Set Maiden kèm full và title", image: "🌸", category: "dichvu", sold: 112 },
            { name: "Set Saber + f + title", price: 20000, description: "Set Saber kèm full và title", image: "⚔️", category: "dichvu", sold: 87 }
        ];

        async function resetAndSeed() {
            addLog("=== BẮT ĐẦU RESET & SEED ===");
            const productsRef = collection(db, "products");
            const snapshot = await getDocs(productsRef);
            addLog(`Đang xóa ${snapshot.size} sản phẩm cũ...`);
            for (const docSnap of snapshot.docs) {
                await deleteDoc(doc(db, "products", docSnap.id));
                addLog(`Đã xóa: ${docSnap.id}`);
            }
            addLog("Bắt đầu tạo sản phẩm mới...");
            for (const item of allItems) {
                await addDoc(productsRef, item);
                addLog(`✓ Đã tạo: ${item.name}`);
            }
            addLog("=== HOÀN TẤT RESET & SEED ===");
            await loadAndRender();
        }

        async function loadAndRender() {
            try {
                const user = auth.currentUser;
                if (!user) {
                    addLog("Chưa đăng nhập, chuyển về index.html", true);
                    window.location.href = 'index.html';
                    return;
                }
                addLog(`User: ${user.email}`);
                const snapshot = await getDocs(collection(db, "products"));
                const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                addLog(`Lấy được ${products.length} sản phẩm từ Firestore.`);
                
                if (products.length === 0) {
                    container.innerHTML = '<div class="error-box">⚠️ Không có sản phẩm. Nhấn nút "Xóa & Tạo lại" để tạo dữ liệu.</div>';
                    addLog("Không có sản phẩm nào.", true);
                    return;
                }
                
                const categories = { sanpham: [], dichvu: [] };
                products.forEach(p => {
                    if (p.category === 'sanpham') categories.sanpham.push(p);
                    else if (p.category === 'dichvu') categories.dichvu.push(p);
                    else addLog(`Sản phẩm ${p.name} có category lạ: "${p.category}"`, true);
                });
                addLog(`Số lượng: sản phẩm = ${categories.sanpham.length}, dịch vụ = ${categories.dichvu.length}`);
                
                let html = '';
                if (categories.sanpham.length > 0) {
                    html += `<div class="category-section"><div class="category-title"><i class="fas fa-box"></i> 🛒 SẢN PHẨM</div><div class="products-grid">`;
                    for (const prod of categories.sanpham) {
                        html += `<div class="product-card glass-edge">
                            <div class="product-img"><span style="font-size:3rem;">${prod.image || '📦'}</span></div>
                            <div class="product-info" style="padding:1rem;">
                                <h3>${prod.name}</h3>
                                <p style="font-size:0.8rem;color:#ccc;">${prod.description}</p>
                                <div class="sold-badge"><i class="fas fa-chart-line"></i> Đã bán: ${(prod.sold || 0).toLocaleString()}</div>
                                <div class="price-tag">${prod.price.toLocaleString()} VNĐ</div>
                                <button class="buy-btn cyber-button" data-id="${prod.id}" data-price="${prod.price}" data-name="${prod.name}">MUA NGAY <i class="fas fa-bolt"></i></button>
                                <div class="note">✓ Giao hàng tự động ✓ Hỗ trợ 24/7</div>
                            </div>
                        </div>`;
                    }
                    html += `</div></div>`;
                }
                if (categories.dichvu.length > 0) {
                    html += `<div class="category-section"><div class="category-title"><i class="fas fa-cogs"></i> ⚙️ DỊCH VỤ</div><div class="products-grid">`;
                    for (const prod of categories.dichvu) {
                        html += `<div class="product-card glass-edge">
                            <div class="product-img"><span style="font-size:3rem;">${prod.image || '🔧'}</span></div>
                            <div class="product-info" style="padding:1rem;">
                                <h3>${prod.name}</h3>
                                <p style="font-size:0.8rem;color:#ccc;">${prod.description}</p>
                                <div class="sold-badge"><i class="fas fa-chart-line"></i> Đã bán: ${(prod.sold || 0).toLocaleString()}</div>
                                <div class="price-tag">${prod.price.toLocaleString()} VNĐ</div>
                                <button class="buy-btn cyber-button" data-id="${prod.id}" data-price="${prod.price}" data-name="${prod.name}">MUA NGAY <i class="fas fa-bolt"></i></button>
                                <div class="note">✓ Giao hàng tự động ✓ Hỗ trợ 24/7</div>
                            </div>
                        </div>`;
                    }
                    html += `</div></div>`;
                }
                if (html === '') {
                    container.innerHTML = '<div class="error-box">⚠️ Không có sản phẩm nào thuộc danh mục sản phẩm hoặc dịch vụ. Hãy nhấn nút "Xóa & Tạo lại"</div>';
                    addLog("Không có sản phẩm hợp lệ.", true);
                } else {
                    container.innerHTML = html;
                    addLog("Đã render giao diện thành công.");
                }
                
                document.querySelectorAll('.buy-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const productId = btn.dataset.id;
                        const price = parseInt(btn.dataset.price);
                        const productName = btn.dataset.name;
                        const user = auth.currentUser;
                        if (!user) return;
                        const userRef = doc(db, "users", user.uid);
                        try {
                            await runTransaction(db, async (transaction) => {
                                const userSnap = await transaction.get(userRef);
                                if (!userSnap.exists()) throw new Error("User data missing");
                                const balance = userSnap.data().balance;
                                if (balance < price) throw new Error(`Số dư không đủ (${balance} Robux)`);
                                transaction.update(userRef, { balance: balance - price });
                                const orderRef = doc(collection(db, "orders"));
                                transaction.set(orderRef, {
                                    userId: user.uid,
                                    productId,
                                    productName,
                                    price,
                                    status: "completed",
                                    timestamp: new Date(),
                                    orderId: orderRef.id
                                });
                            });
                            alert(`✅ Mua thành công: ${productName}`);
                            await updateBalanceDisplay();
                            await loadAndRender();
                        } catch (err) {
                            alert("Lỗi: " + err.message);
                        }
                    });
                });
            } catch (err) {
                addLog(`LỖI NGHIÊM TRỌNG: ${err.message}`, true);
                container.innerHTML = `<div class="error-box">❌ Lỗi: ${err.message}</div>`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html';
            else {
                updateBalanceDisplay();
                loadAndRender();
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const { signOut } = await import('./js/firebase-config.js');
            await signOut(auth);
            window.location.href = 'index.html';
        });
        
        document.getElementById('resetProductsBtn').addEventListener('click', resetAndSeed);
    </script>
</body>
</html>
