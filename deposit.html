<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MIKEY SHOP | NẠP ROBUX</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="futuristic-bg">
    <nav class="neon-nav">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-cube"></i><span>MIKEY<span class="glow">SHOP</span></span></div>
            <div class="nav-links">
                <a href="home.html" class="nav-item active"><i class="fas fa-store"></i> Trang chủ</a>
                <a href="orders.html" class="nav-item"><i class="fas fa-truck-fast"></i> Đơn hàng</a>
                <a href="deposit.html" class="nav-item"><i class="fas fa-coins"></i> Nạp Robux</a>
            </div>
            <div class="user-panel">
                <div class="credit-badge"><i class="fas fa-gem"></i><span id="userBalance">0</span> Robux</div>
                <button id="logoutBtn" class="cyber-button small"><i class="fas fa-power-off"></i> Thoát</button>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="deposit-panel glass-edge">
            <h2><i class="fas fa-coins"></i> KHO ROBUX</h2>
            <div class="balance-preview">Số dư: <span id="currentBal">0</span> Robux</div>
            <input type="number" id="depositAmount" placeholder="Nhập số Robux" min="1" class="cyber-input">
            <button id="depositBtn" class="cyber-button full"><i class="fas fa-plus-circle"></i> NẠP NGAY</button>
            <div id="depositMsg" class="message-area"></div>
        </div>
    </main>
    <footer class="cyber-footer"><p>© 2036 MIKEY SHOP — Roblox uy tín số 1</p></footer>
    <script type="module">
        import { auth, db, doc, getDoc, updateDoc, onAuthStateChanged } from './js/firebase-config.js';
        import { updateBalanceDisplay } from './js/common.js';
        let currentUser = null;
        async function showBalance() { if(currentUser) { const snap = await getDoc(doc(db, "users", currentUser.uid)); if(snap.exists()) document.getElementById('currentBal').innerText = snap.data().balance; } }
        document.getElementById('depositBtn').addEventListener('click', async () => {
            const amount = parseInt(document.getElementById('depositAmount').value);
            if(isNaN(amount)||amount<=0) { document.getElementById('depositMsg').innerText="Nhập số hợp lệ"; return; }
            if(!currentUser) return;
            const userRef = doc(db,"users",currentUser.uid);
            const userSnap = await getDoc(userRef);
            const newBalance = userSnap.data().balance + amount;
            await updateDoc(userRef, { balance: newBalance });
            document.getElementById('depositMsg').innerText = `✅ Nạp +${amount} Robux! Số dư mới: ${newBalance}`;
            updateBalanceDisplay(); showBalance();
            document.getElementById('depositAmount').value = '';
        });
        onAuthStateChanged(auth, (user) => { if(!user) window.location.href='index.html'; else { currentUser=user; updateBalanceDisplay(); showBalance(); } });
        document.getElementById('logoutBtn').addEventListener('click', async () => { const { signOut } = await import('./js/firebase-config.js'); await signOut(auth); window.location.href='index.html'; });
    </script>
</body>
</html>
